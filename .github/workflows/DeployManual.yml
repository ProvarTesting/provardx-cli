name: Publish to NPM and MCP Registry
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'tag name e.g. beta, latest etc.'
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          scope: '@provartesting'
      - name: Install dependencies and build
        run: |
          npm install -g @salesforce/cli
          yarn
          yarn prepack
      - name: Display file
        run: |
          cat /home/runner/work/_temp/.npmrc
          cat $NPM_CONFIG_USERCONFIG
      - name: Publish package on NPM
        run: npm publish --tag "$TAG" --access public
        env:
          TAG: ${{ github.event.inputs.tag || 'latest' }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xzf - -f - mcp-publisher
          chmod +x ./mcp-publisher
      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc
      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
